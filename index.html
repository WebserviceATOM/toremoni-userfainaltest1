<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鉄道データBOX - 本番</title>
    <!-- Supabaseライブラリ読み込み -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --line-green: #06C755; --main-blue: #007bff; }
        body { font-family: -apple-system, sans-serif; background: #f0f4f8; display: flex; justify-content: center; padding: 20px; margin:0; }
        .container { width: 100%; max-width: 450px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #eee; position: relative; }
        h1 { text-align: center; font-size: 1.4rem; color: #333; margin-bottom: 25px; }
        .avatar-frame { width: 65px; height: 65px; border-radius: 50%; overflow: hidden; background: #ddd; border: 2px solid white; }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
        button { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-google { background: #4285F4; color: white; }
        .btn-x { background: #000; color: white; }
        .btn-line { background: var(--line-green); color: white; }
        input, select { width: 100%; padding: 10px; margin-top: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .hidden { display: none; }
        .logout { background: none; color: #999; text-decoration: underline; font-size: 0.8rem; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>鉄道データBOX</h1>

    <!-- ログイン前 -->
    <div id="ui-out">
        <p style="text-align:center;">アカウントを連携して開始</p>
        <button class="btn-google" onclick="loginAction('google')">Googleでログイン</button>
        <button class="btn-x" onclick="loginAction('x')">X(Twitter)でログイン</button>
    </div>

    <!-- ログイン後（マイページ） -->
    <div id="ui-in" class="hidden">
        <div class="card">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="avatar-frame"><img id="v-avatar" src=""></div>
                <div>
                    <strong id="v-name">読み込み中...</strong><br>
                    <small id="v-x" style="color:var(--main-blue);">@---</small><br>
                    <small style="color:#999">No. <span id="v-no">----</span></small>
                </div>
            </div>
        </div>

        <div class="card" style="border: 1px solid var(--line-green);">
            <p style="margin:0; font-size:0.8rem; font-weight:bold;">管理用LINE通知（内部ID連携）</p>
            <button class="btn-line" onclick="linkLineAction()">LINE連携を実行</button>
            <p style="font-size:0.6rem; color:#666; margin-top:5px;">※名前や写真は取得されません。</p>
        </div>

        <div class="card">
            <h3>プロフィール・表示設定</h3>
            表示名: <input type="text" id="in-name">
            廃車時期: <input type="text" id="in-scrap" placeholder="2025-03">
            <p style="font-size:0.8rem;">最後に見た路線: <b id="v-route">---</b></p>
            <label><input type="checkbox" id="in-belonging"> 所属を表示する</label>
            <button onclick="saveSettingsAction()" style="background:#333; color:white; margin-top:15px;">設定を保存する</button>
        </div>

        <button class="logout" onclick="logoutAction()">ログアウト</button>
    </div>
</div>

<script>
    // --- 1. Supabaseの初期化 (変数名の重複エラーを回避するために名前を工夫) ---
    const _SUB_URL = "https://nnugdjrhmvbyjyibdaog.supabase.co";
    const _SUB_KEY = "sb_publishable_cOJy7k7tomsBgSaK-aMhBg_t42yNiip"; 
    const _client = window.supabase.createClient(_SUB_URL, _SUB_KEY);

    console.log("✅ Supabase起動成功!");

    // --- 2. ログイン・ログアウト処理 ---
    async function loginAction(provider) {
        await _client.auth.signInWithOAuth({
            provider: provider,
            options: { redirectTo: window.location.origin }
        });
    }

    async function logoutAction() {
        await _client.auth.signOut();
        location.reload();
    }

    // --- 3. LINE連携 ---
    async function linkLineAction() {
        const { data: { user } } = await _client.auth.getUser();
        if (!user) return alert("ログインしてください");
        window.location.href = `${_SUB_URL}/functions/v1/line-auth?state=${user.id}`;
    }

    // --- 4. データの表示・読み込み ---
    async function loadProfileData(user) {
        const { data, error } = await _client.from('profiles').select('*').eq('id', user.id).single();
        if (data) {
            document.getElementById('v-name').innerText = data.display_name || "未設定";
            document.getElementById('in-name').value = data.display_name || "";
            document.getElementById('v-x').innerText = "@" + (data.x_username || "未設定");
            document.getElementById('v-avatar').src = data.avatar_url || "https://via.placeholder.com/70";
            document.getElementById('v-no').innerText = String(data.user_number).padStart(4, '0');
            document.getElementById('v-route').innerText = data.last_viewed_route || "なし";
            document.getElementById('in-belonging').checked = data.show_belonging;
            document.getElementById('in-scrap').value = data.scrap_date || "";

            document.getElementById('ui-out').classList.add('hidden');
            document.getElementById('ui-in').classList.remove('hidden');
        }
    }

    // --- 5. 設定の保存 ---
    async function saveSettingsAction() {
        const { data: { user } } = await _client.auth.getUser();
        const updates = {
            display_name: document.getElementById('in-name').value,
            show_belonging: document.getElementById('in-belonging').checked,
            scrap_date: document.getElementById('in-scrap').value,
            last_viewed_route: "南大阪線", // テスト用固定値
            updated_at: new Date()
        };
        const { error } = await _client.from('profiles').update(updates).eq('id', user.id);
        if (error) alert("エラー: " + error.message);
        else { alert("保存しました！"); location.reload(); }
    }

    // ログイン状態を監視
    _client.auth.onAuthStateChange((event, session) => {
        if (session) loadProfileData(session.user);
    });
</script>
</body>
</html>
